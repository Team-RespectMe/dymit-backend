spring:
  profiles:
    active: test
  application:
    name: dymit-api-test
#  data:
#    mongodb:
#      host: ${DYMIT_MONGODB_HOST:localhost}
#      port: ${DYMIT_MONGODB_PORT:27017}
#      database: ${DYMIT_MONGODB_DATABASE:dymit}
#      username: ${DYMIT_MONGODB_USERNAME:test_admin}
#      password: ${DYMIT_MONGODB_PASSWORD:test1234}
#      authentication-database: ${DYMIT_MONGODB_AUTHENTICATION_DATABASE:dymit}
  data:
    mongodb:
      port: 0

server:
  port: 0

de.flapdoodle.mongodb.embedded.version: 5.0.14

test:
  id-token:
    google: ${DYMIT_TEST_ID_TOKEN_GOOGLE}

firebase:
  config:
    path: ${DYMIT_FIREBASE_CONFIG_PATH:src/test/resources/firebase-test-credentials.json}

jwt:
  secret: ${DYMIT_JWT_SECRET:secret}
  expiration: ${DYMIT_JWT_EXPIRATION:3600} # seconds
  issuer: ${DYMIT_JWT_ISSUER:https://test.dymit.com}
  audience: ${DYMIT_JWT_AUDIENCE:https://test.dymit.com}
  access-token:
    expiration: ${DYMIT_JWT_ACCESS_TOKEN_EXPIRATION:900000} # milliseconds
  refresh-token:
    expiration: ${DYMIT_JWT_REFRESH_TOKEN_EXPIRATION:2592000000} # milliseconds

dymit:
  oidc:
    apple:
      audience: ${DYMIT_OIDC_APPLE_AUDIENCE:test.apple.client.id}
    google:
      audience: ${DYMIT_OIDC_GOOGLE_AUDIENCE:test.google.client.id}
    kakao:
      audience: ${DYMIT_OIDC_KAKAO_AUDIENCE:test.kakao.client.id}

cdn:
  domain: ${DYMIT_CDN_DOMAIN:https://cdn.test.local}
  origin:
    bucketName: ${DYMIT_S3_BUCKET_NAME:}
    domain: ${DYMIT_S3_DOMAIN:}

log-reporter:
  discord:
    webhook:
      url: ${DYMIT_DISCORD_WEBHOOK_URL:https://discord.test.local/webhook}
    quartz:
      webhook:
        url: ${DYMIT_DISCORD_QUARTZ_WEBHOOK_URL:https://discord.test.local/quartz-webhook}

swagger:
  domain: ${DYMIT_SWAGGER_DOMAIN:https://api.test.local}

logging:
  level:
    root: INFO
